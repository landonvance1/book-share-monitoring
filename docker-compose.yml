services:
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: bookshare-prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - booksharing
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    container_name: bookshare-grafana
    ports:
      - "3100:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - booksharing
      - monitoring-internal
    restart: unless-stopped

  loki-init:
    image: busybox
    container_name: bookshare-loki-init
    user: "0"
    command: ["sh", "-c", "chown -R 10001:10001 /loki && echo 'loki data dir initialized'"]
    volumes:
      - loki_data:/loki
    restart: "no"

  loki:
    image: grafana/loki:3.6.0
    container_name: bookshare-loki
    user: "10001:10001"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    networks:
      - monitoring-internal
    depends_on:
      loki-init:
        condition: service_completed_successfully
    restart: unless-stopped

  alloy:
    image: grafana/alloy:v1.14.1
    container_name: bookshare-alloy
    user: "0"  # Root required for Docker socket access — grants log-collection-only read access to container metadata
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=127.0.0.1:12345
      - --stability.level=generally-available
    networks:
      - monitoring-internal
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  booksharing:
    external: true
  monitoring-internal:
    internal: true  # No external routing — only Loki, Alloy, and Grafana can communicate on this network
